<script type="module">
  import { define, html } from '/static/node_modules/hybrids/src/index.js';

  stomp_subscribe("nspanel/{{ nspanel.mac_address }}/status", (message) => {
    var element = document.getElementById(`nspanel-humidity-status-{{ nspanel.id }}`);
    var data = JSON.parse(message.body);
    element.state = data.state;
    element.humidity = Math.round(data.humidity*10)/10;
  })

  define({
    tag: "nspanel-humidity-status",
    nspanel_id: '',
    state: '',
    humidity: '',
    render: ({id, nspanel_id, state, humidity}) => {
      if (state == "offline" || state == "unknown") {
        return html`
           <div class="icon-text">
                <span class="icon me-1">
                    <i class="mdi mdi-water-percent"></i>
                </span>
                Humidity: <span id="humidity-${nspanel_id}">?%</span>
            </div>
        `;
      } else {
        return html`
            <div class="icon-text">
                <span class="icon me-1">
                    <i class="mdi mdi-water-percent"></i>
                </span>
                Humidity: <span id="humidity-${nspanel_id}">${humidity}%</span>
            </div>
        `;
      }
    },
  })
</script>

<nspanel-humidity-status id="nspanel-humidity-status-{{ nspanel.id }}" nspanel_id="{{ nspanel.id }}" state="" humidity=""></nspanel-humidity-status>
