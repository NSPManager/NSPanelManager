<script type="module">
  import { define, html } from '/static/node_modules/hybrids/src/index.js';

  stomp_subscribe("nspanel/{{ nspanel.mac_address }}/status", (message) => {
    var element = document.getElementById(`nspanel-light-status-{{ nspanel.id }}`);
    var data = JSON.parse(message.body);
    element.state = data.state;
    element.light = Math.round(data.light*10)/10;
  })

  define({
    tag: "nspanel-light-status",
    nspanel_id: '',
    state: '',
    light: '',
    render: ({id, nspanel_id, state, light}) => {
      if (state == "offline" || state == "unknown") {
        return html`
           <div class="icon-text">
                <span class="icon me-1">
                    <i class="mdi mdi-lightbulb-on-10"></i>
                </span>
                Light: <span id="light-${nspanel_id}">${light} lux</span>
            </div>
        `;
      } else {
        return html`
            <div class="icon-text">
                <span class="icon me-1">
                    <i class="mdi mdi-lightbulb-on-10"></i>
                </span>
                Light: <span id="light-${nspanel_id}">${light} lux</span>
            </div>
        `;
      }
    },
  })
</script>

<nspanel-light-status id="nspanel-light-status-{{ nspanel.id }}" nspanel_id="{{ nspanel.id }}" state="" light=""></nspanel-light-status>
