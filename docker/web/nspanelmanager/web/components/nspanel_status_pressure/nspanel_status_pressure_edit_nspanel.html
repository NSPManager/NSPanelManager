<script type="module">
  import { define, html } from '/static/node_modules/hybrids/src/index.js';

  stomp_subscribe("nspanel/{{ nspanel.mac_address }}/status", (message) => {
    var element = document.getElementById(`nspanel-pressure-status-{{ nspanel.id }}`);
    var data = JSON.parse(message.body);
    element.state = data.state;
    element.pressure = Math.round(data.pressure*10)/10;
  })

  define({
    tag: "nspanel-pressure-status",
    nspanel_id: '',
    state: '',
    pressure: '',
    render: ({id, nspanel_id, state, pressure}) => {
      if (state == "offline" || state == "unknown") {
        return html`
           <div class="icon-text">
                <span class="icon me-1">
                    <i class="mdi mdi-gauge"></i>
                </span>
                Pressure: <span id="pressure-${nspanel_id}">? Pa</span>
            </div>
        `;
      } else {
        return html`
            <div class="icon-text">
                <span class="icon me-1">
                    <i class="mdi mdi-gauge"></i>
                </span>
                Pressure: <span id="pressure-${nspanel_id}">${pressure} Pa</span>
            </div>
        `;
      }
    },
  })
</script>

<nspanel-pressure-status id="nspanel-pressure-status-{{ nspanel.id }}" nspanel_id="{{ nspanel.id }}" state="" pressure=""></nspanel-pressure-status>
