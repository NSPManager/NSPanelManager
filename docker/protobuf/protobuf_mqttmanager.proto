syntax = "proto3";
import "protobuf_formats.proto";

// Protobufs defined in this .proto file are used to communicate between the MQTTManager and Django

message NSPanelSettings {
    optional int32 id = 1;
    string mac_address = 2;
    string name = 3;
    int32 home = 4;

    enum NSPanelDefaultPage {
        MAIN_PAGE = 0;
        SCENES_PAGE = 1;
        ROOM_PAGE = 2;
    }
    NSPanelDefaultPage default_page = 5;

    int32 raise_to_100_light_level = 6;
    int32 min_button_push_time = 10;
    int32 button_long_press_time = 11;
    int32 special_mode_trigger_time = 12;
    int32 special_mode_release_time = 13;
    int32 screen_dim_level = 15;
    int32 screensaver_dim_level = 16;
    int32 screensaver_activation_timeout = 17;

    // Make sure this is updated together with protobuf_nspanel
    enum NSPanelScreensaverMode {
        WEATHER_WITH_BACKGROUND = 0;
        WEATHER_WITHOUT_BACKGROUND = 1;
        DATETIME_WITH_BACKGROUND = 3;
        DATETIME_WITHOUT_BACKGROUND = 4;
        NO_SCREENSAVER = 5;
    }
    NSPanelScreensaverMode screensaver_mode = 18;

    time_format clock_format = 19;
    temperature_format temperature_unit = 20;
    bool is_us_panel = 21;
    bool lock_to_default_room = 22;
    bool reverse_relays = 23;
    bool relay1_default_mode = 24;
    bool relay2_default_mode = 25;
    int32 temperature_calibration = 26;

    enum NSPanelButtonMode {
        DIRECT_MODE = 0;
        DETACHED_MODE = 1;
        CUSTOM_MQTT = 2;
        FOLLOW_MODE = 3;
    }
    enum NSPanelButtonFallbackMode {
        DISABLED=0;
        TOGGLE_RELAY1 = 1;
        TOGLLE_RELAY2 = 2;
    }
    NSPanelButtonMode button1_mode = 30;
    NSPanelButtonFallbackMode button1_fallback = 31;
    NSPanelButtonMode button2_mode = 32;
    NSPanelButtonFallbackMode button2_fallback = 33;

    NSPanelButtonMode button1_long_mode = 34;
    NSPanelButtonFallbackMode button1_long_fallback = 35;
    NSPanelButtonMode button2_long_mode = 36;
    NSPanelButtonFallbackMode button2_long_fallback = 37;

    optional string button1_mqtt_topic = 38;
    optional string button2_mqtt_topic = 39;
    optional string button1_mqtt_payload = 40;
    optional string button2_mqtt_payload = 41;
    optional int32 button1_detached_light_id = 42;
    optional int32 button2_detached_light_id = 43;

    optional string button1_long_mqtt_topic = 44;
    optional string button2_long_mqtt_topic = 45;
    optional string button1_long_mqtt_payload = 46;
    optional string button2_long_mqtt_payload = 47;
    optional int32 button1_long_detached_light_id = 48;
    optional int32 button2_long_detached_light_id = 49;

    bool denied = 50;
    bool accepted = 51;
    repeated int32 rooms = 52;
    repeated int32 scenes = 53;
    string ip_address = 54;

    enum RelayRegisterType {
        SWITCH = 0;
        LIGHT = 1;
    }
    RelayRegisterType relay1_register_type = 55;
    RelayRegisterType relay2_register_type = 56;

    int32 default_room = 57;
}

message MultipleNSPanelsSettings {
    repeated NSPanelSettings nspanels = 1;
}
